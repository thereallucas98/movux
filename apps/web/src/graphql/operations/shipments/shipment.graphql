query Shipment($id: ID!) {
  shipment(id: $id) {
    id
    status
    type
    description
    estimatedWeightKg
    estimatedVolumeM3
    vehicleTypeRequired
    scheduledDate
    timeWindow
    specificTime
    customerSlaHours
    suggestedPriceInCents
    finalPriceInCents
    createdAt
    addresses {
      id
      type
      street
      number
      complement
      neighborhoodId
      neighborhoodName
      cityId
      state
      zipCode
    }
  }
}
